# spring.h2.console.enabled=true

# Base de datos
spring.datasource.url=${DRAWQUEST_DB_URL:jdbc:mysql://localhost:3306/drawquest_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DRAWQUEST_DB_USERNAME:drawquest_admin}
spring.datasource.password=${DRAWQUEST_DB_PASSWORD:}

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
# Ejecuta el resources/schema.sql y crea las tablas si no existen
spring.sql.init.mode=always

# Seguridad
# DRAWQUEST_JWT_SECRET debe estar en Base64 y tener al menos 256 bits para HS256.
jwt.secret=${DRAWQUEST_JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
jwt.expirationMs=${DRAWQUEST_JWT_EXPIRATION_MS:3600000}

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Subir archivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
