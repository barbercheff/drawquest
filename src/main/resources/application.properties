spring.application.name=drawquest

# H2 in-memory database
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true

# Database
spring.datasource.url=${DRAWQUEST_DB_URL:jdbc:mysql://localhost:3306/drawquest_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DRAWQUEST_DB_USERNAME:drawquest_admin}
spring.datasource.password=${DRAWQUEST_DB_PASSWORD:}

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Database migrations
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Allows existing local databases created from the old schema.sql to be adopted by Flyway.
spring.flyway.baseline-on-migrate=true

# Security
# DRAWQUEST_JWT_SECRET must be Base64 and at least 256 bits for HS256.
jwt.secret=${DRAWQUEST_JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
jwt.expirationMs=${DRAWQUEST_JWT_EXPIRATION_MS:3600000}

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# File uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
